spring:
  datasource:
    #    url: jdbc:h2:file:./data/hospin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    #    username: sa
    #    password:
    #    driver-class-name: org.h2.Driver
    url: jdbc:mariadb://localhost:3306/hospin
    username: user
    password: ${database.password}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  ai:
    openai:
      api-key: ${openai.api-key}