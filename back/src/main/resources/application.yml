server:
  port: 8080

spring:
  application:
    name: HosPin

  profiles:
    active: dev

  config:
    import: optional:application-secret.yml

  jpa:
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info, metrics
  metrics:
    enable:
      jvm: true
      all: true
    distribution:
      percentiles:
        http.server.requests: 0.95, 0.5

