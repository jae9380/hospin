version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: hospin-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - hospin-network

  grafana:
    image: grafana/grafana:latest
    container_name: hospin-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - hospin-network

networks:
  hospin-network:
    external: true