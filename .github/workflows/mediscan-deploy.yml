name: hospin deploy

on:
  push:
    paths:
      - .github/workflows/mediscan-deploy.yml
      - back/src/**
      - back/build.gradle
      - back/docker/Dockerfile
      - back/deploy/**
    branches:
      - main

permissions:
  contents: write
  packages: write
  actions: write
  deployments: write

jobs:
  dockerImagePreparationBuildAndPush:
    name: 도커 이미지 준비, Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 도커 Buildx 설치
        uses: docker/setup-buildx-action@v2

      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository OWNER 아이디를 소문자로 변환해 저장
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: application-secret.yml 생성
        run: echo "$APPLICATION_SECRET" > back/src/main/resources/application-secret.yml
        env:
          APPLICATION_SECRET: ${{ secrets.APPLICATION_SECRET_YML }}

      - name: Firebase Admin SDK JSON 생성
        run: echo "$FIREBASE_ADMIN_SDK_JSON" > back/src/main/resources/hospin-57573-firebase-adminsdk-fbsvc-0838118bdb.json
        env:
          FIREBASE_ADMIN_SDK_JSON: ${{ secrets.FIREBASE_ADMIN_SDK_JSON }}

      - name: 생성된 파일 확인
        run: |
          echo "=== application-secret.yml ==="
          cat back/src/main/resources/application-secret.yml
          echo "=== firebase json ==="
          ls -la back/src/main/resources/

      - name: 도커 이미지 Build & GitHub Container Registry로 Push
        uses: docker/build-push-action@v3
        with:
          context: ./back
          file: ./back/docker/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/hospin-back:latest

  deploy:
    name: 서버 Zero Downtime 배포
    runs-on: ubuntu-latest
    needs: [dockerImagePreparationBuildAndPush]
    steps:
      - name: SSH로 서버 접속 후 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            mkdir -p /docker_projects/hospin
            curl -o /docker_projects/hospin/zero_downtime_deploy.py \
              https://raw.githubusercontent.com/${{ github.repository }}/main/back/deploy/zero_downtime_deploy.py
            chmod +x /docker_projects/hospin/zero_downtime_deploy.py
            source /etc/hospin/.env
            python3 /docker_projects/hospin/zero_downtime_deploy.py
